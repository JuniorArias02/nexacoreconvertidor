<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetría | NexaCoreConvertidor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .hero {
            position: relative;
            overflow: hidden;
            border-radius: 2.5rem;
            background: linear-gradient(to bottom right, #7c3aed, #4f46e5, #1d4ed8);
            padding: 3rem 4rem;
            box-shadow: 0 25px 50px -12px rgba(79, 70, 229, 0.4);
            margin-bottom: 2.5rem;
            width: 100%;
            max-width: 900px;
            box-sizing: border-box;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.25rem 0.75rem;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #fff;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            margin-bottom: 1.5rem;
        }
        .title {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -0.025em;
            color: #fff;
            margin: 0 0 1rem 0;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .subtitle {
            color: #e0e7ff;
            font-size: 1.125rem;
            font-weight: 500;
            line-height: 1.625;
            opacity: 0.9;
            margin: 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 900px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px -10px rgba(79, 70, 229, 0.15);
            border-radius: 1.5rem;
            padding: 2rem;
            transition: all 0.5s ease;
            cursor: default;
        }
        .glass-card:hover {
            transform: scale(1.03);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 4px 24px -4px rgba(99, 102, 241, 0.25);
        }
        .card-label {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #94a3b8;
            margin-bottom: 0.75rem;
            display: block;
        }
        .card-value {
            font-size: 2.5rem;
            font-weight: 900;
            color: #f8fafc;
            margin: 0;
            letter-spacing: -0.025em;
            transition: color 0.3s ease;
        }
        .text-success { color: #34d399; }
        .text-warning { color: #fbbf24; }
        .text-danger { color: #f87171; }
        .text-accent { color: #818cf8; }
        
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .dot-green { background-color: #34d399; box-shadow: 0 0 12px #34d399; animation: pulse 2s infinite;}
        .dot-red { background-color: #f87171; box-shadow: 0 0 12px #f87171; animation: pulseError 1s infinite;}
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
            100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
        }
        @keyframes pulseError {
            0% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(248, 113, 113, 0); }
            100% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0); }
        }
        
        .footer {
            margin-top: 3rem;
            text-align: center;
            color: #64748b;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
        .spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Adaptación para dispositivos móviles */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }
            .hero {
                padding: 2rem 1.5rem;
                border-radius: 1.5rem;
                margin-bottom: 1.5rem;
            }
            .title {
                font-size: 1.8rem;
            }
            .subtitle {
                font-size: 0.95rem;
            }
            .grid {
                gap: 1rem;
            }
            .glass-card {
                padding: 1.5rem;
                border-radius: 1.25rem;
            }
            .card-value {
                font-size: 2rem;
            }
            #val-lista-errores {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="hero group">
        <span class="badge" id="badge-status">
            <span class="status-dot dot-green" id="dot-status"></span> 
            <span id="text-status">Conectado</span>
        </span>
        <h1 class="title">NexaCore Convertidor</h1>
        <p class="subtitle">Métricas de rendimiento en tiempo real.</p>
    </div>

    <div class="grid">
        <div class="glass-card">
            <span class="card-label">Peticiones Totales</span>
            <p class="card-value text-accent" id="val-peticiones"><span class="spinner"></span></p>
        </div>
        <div class="glass-card">
            <span class="card-label">Conversiones Exitosas</span>
            <p class="card-value text-success" id="val-exitos"><span class="spinner"></span></p>
        </div>
        <div class="glass-card">
            <span class="card-label">Tasa de Éxito</span>
            <p class="card-value" id="val-tasa"><span class="spinner"></span></p>
        </div>
        <div class="glass-card">
            <span class="card-label">Errores de Conversión</span>
            <p class="card-value text-danger" id="val-errores"><span class="spinner"></span></p>
        </div>
        <div class="glass-card">
            <span class="card-label">Consumo de Memoria (RSS)</span>
            <p class="card-value" id="val-memoria"><span class="spinner"></span></p>
        </div>
        <div class="glass-card">
            <span class="card-label">Uptime del Motor</span>
            <p class="card-value" id="val-uptime"><span class="spinner"></span></p>
        </div>
        
        <!-- Nuevo Panel de Detalle de Errores -->
        <div class="glass-card" style="grid-column: 1 / -1; padding-top: 1.5rem; padding-bottom: 1.5rem;">
            <span class="card-label text-danger">Últimos Errores</span>
            <div id="val-lista-errores" style="margin-top: 1rem; font-size: 0.85rem; color: #fca5a5; line-height: 1.6; font-family: monospace; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 0.5rem; border-left: 4px solid #ef4444;">
                <span class="spinner"></span> Cargando...
            </div>
        </div>
    </div>

    <div class="footer">
        NexaCoreConvertidor &nbsp;|&nbsp; <span id="val-os">--</span>
    </div>

    <!-- Cliente oficial de Socket.IO servido localmente a través de la API (Sin dependencias externas) -->
    <script src="/api/recursos/socket.js"></script>
    <script>
        // Logica Frontend WebSockets (Cero Delay)
        const socket = io();

        // Escucha evento de conexión
        socket.on('connect', () => {
            document.getElementById('dot-status').className = 'status-dot dot-green';
            document.getElementById('text-status').innerText = 'CONECTADO';
        });

        // El backend "empuja" (push) este evento cada segundo
        socket.on('telemetria_actualizada', (data) => {
            // Actualización del DOM ultra rápida
            document.getElementById('val-peticiones').innerText = data.totalPeticiones;
            document.getElementById('val-exitos').innerText = data.totalExitos;
            
            const tasaEl = document.getElementById('val-tasa');
            tasaEl.innerText = data.tasaExito + '%';
            tasaEl.style.color = data.colorTasa;
            
            document.getElementById('val-errores').innerText = data.totalErrores;
            document.getElementById('val-memoria').innerHTML = data.memoryUsage + ' <span style="font-size: 1.25rem;">MB</span>';
            document.getElementById('val-uptime').innerText = data.uptimeText;
            document.getElementById('val-os').innerText = data.osType;
            
            // Renderizar los últimos errores
            const contenedorErrores = document.getElementById('val-lista-errores');
            if (data.ultimosErrores && data.ultimosErrores.length > 0) {
                contenedorErrores.innerHTML = data.ultimosErrores.map(err => `<div>• ${err}</div>`).join('');
            } else {
                contenedorErrores.innerHTML = '<span style="color: #34d399;">✓ Sin errores recientes.</span>';
                contenedorErrores.style.borderLeftColor = '#34d399';
            }
        });

        // Escucha si el servidor se cae
        socket.on('disconnect', () => {
            document.getElementById('dot-status').className = 'status-dot dot-red';
            document.getElementById('text-status').innerText = 'DESCONECTADO';
        });
    </script>
</body>
</html>
